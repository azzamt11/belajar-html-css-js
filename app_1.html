<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-Digit Mental Math Challenge</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .game-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h1 { margin-top: 0; color: #333; }
        #timer { font-size: 1.5rem; color: #e74c3c; font-weight: bold; }
        #question { font-size: 2.5rem; margin: 1rem 0; font-weight: bold; color: #2c3e50; }
        #answer { font-size: 1.5rem; padding: 10px; width: 60%; text-align: center; border: 2px solid #ddd; border-radius: 5px; }
        #score { font-size: 1.2rem; color: #27ae60; margin: 1rem 0; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; background-color: #3498db; color: white; border: none; border-radius: 5px; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Mental Math</h1>
    <div id="setup">
        <p>5-Minute Addition Challenge (2-Digit)</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="game-area" class="hidden">
        <div id="timer">05:00</div>
        <div id="score">Score: 0</div>
        <div id="question">-- + --</div>
        <input type="number" id="answer" placeholder="Ans" autofocus>
    </div>

    <div id="result-area" class="hidden">
        <h2>Time's Up!</h2>
        <p id="final-score"></p>
        <button onclick="startGame()">Play Again</button>
    </div>
</div>

<script>
    let score = 0;
    let timeLimit = 5 * 60; // 5 minutes in seconds
    let timerInterval;
    let correctAnswer;

    const questionEl = document.getElementById('question');
    const answerEl = document.getElementById('answer');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const setupEl = document.getElementById('setup');
    const gameAreaEl = document.getElementById('game-area');
    const resultAreaEl = document.getElementById('result-area');
    const finalScoreEl = document.getElementById('final-score');

    function generateQuestion() {
        // Generate two 2-digit numbers (10-99)
        const num1 = Math.floor(Math.random() * 90) + 10;
        const num2 = Math.floor(Math.random() * 90) + 10;
        correctAnswer = num1 + num2;
        questionEl.textContent = `${num1} + ${num2}`;
        answerEl.value = '';
        answerEl.focus();
    }

    function startGame() {
        score = 0;
        let timeLeft = timeLimit;
        scoreEl.textContent = "Score: 0";
        setupEl.classList.add('hidden');
        resultAreaEl.classList.add('hidden');
        gameAreaEl.classList.remove('hidden');
        
        generateQuestion();
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            timerEl.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endGame();
            }
        }, 1000); // 1 second interval
    }

    answerEl.addEventListener('input', () => {
        if (parseInt(answerEl.value) === correctAnswer) {
            score++;
            scoreEl.textContent = "Score: " + score;
            generateQuestion();
        }
    });

    function endGame() {
        gameAreaEl.classList.add('hidden');
        resultAreaEl.classList.remove('hidden');
        finalScoreEl.textContent = `You answered ${score} questions correctly!`;
    }
</script>

</body>
</html>
