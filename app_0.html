<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rotated Modulo Game - Path Restriction</title>
    <style>
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            color: white;
        }

        #ui-layer {
            margin-bottom: 20px;
            text-align: center;
        }

        #status-msg {
            color: #ff4444;
            height: 20px;
            margin-top: 10px;
            font-weight: bold;
        }

        #grid-container {
            display: grid;
            grid-template-columns: repeat(10, 40px); 
            grid-template-rows: repeat(10, 40px);
            border: 2px solid white;
        }

        .cell {
            width: 40px;
            height: 40px;
            border: 1px solid #222;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }

        /* State Styles */
        .visited { background-color: yellow !important; color: black; }
        .target { border: 2px solid cyan !important; color: cyan; font-weight: bold; }
        .player { background-color: red !important; color: white; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="score-display">Score: <span id="score-val">0</span></div>
        <button id="gen-btn" onclick="generateTarget()">Generate Target</button>
        <div id="status-msg"></div>
    </div>

    <div id="grid-container"></div>

    <script>
        class Position {
            constructor(x, y) { this.x = x; this.y = y; }
            copy() { return new Position(this.x, this.y); }
            getIndex() { return this.y * 10 + this.x; }
        }

        class Cube {
            constructor() { this.reset(); }
            reset() {
                this.faceLeft = 0; this.faceBehind = 1; this.faceRight = 2;
                this.faceFront = 3; this.faceUp = 4; this.faceDown = 5;
            }
            // Create a simple data copy to revert state
            getSnapshot() {
                return { ...this };
            }
            restore(snapshot) {
                Object.assign(this, snapshot);
            }
            rotateLeft() {
                const temp = this.faceLeft;
                this.faceLeft = this.faceFront; this.faceFront = this.faceRight;
                this.faceRight = this.faceBehind; this.faceBehind = temp;
            }
            rotateRight() {
                const temp = this.faceRight;
                this.faceRight = this.faceFront; this.faceFront = this.faceLeft;
                this.faceLeft = this.faceBehind; this.faceBehind = temp;
            }
            rotateUp() {
                const temp = this.faceUp;
                this.faceUp = this.faceFront; this.faceFront = this.faceDown;
                this.faceDown = this.faceBehind; this.faceBehind = temp;
            }
            rotateDown() {
                const temp = this.faceDown;
                this.faceDown = this.faceFront; this.faceFront = this.faceUp;
                this.faceUp = this.faceBehind; this.faceBehind = temp;
            }
        }

        let score = 0;
        let targetIndex = null;
        let targetNumber = null;
        let currentPosition = new Position(0, 0);
        const cube = new Cube();
        const visitedCells = new Set([0]); // Start cell is visited

        // Build Grid
        const container = document.getElementById('grid-container');
        for (let i = 0; i < 100; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.id = `cell-${i}`; 
            container.appendChild(cell);
        }

        function generateTarget() {
            targetIndex = Math.floor(Math.random() * 100);
            targetNumber = Math.floor(Math.random() * 100);
            visitedCells.clear();
            updateDisplay();
        }

        function updateDisplay(errorMsg = "") {
            document.getElementById('status-msg').textContent = errorMsg;
            document.getElementById('score-val').textContent = score;

            for (let i = 0; i < 100; i++) {
                const cell = document.getElementById(`cell-${i}`);
                cell.className = 'cell'; // Reset classes
                cell.textContent = '';
                cell.style.backgroundColor = 'black';

                if (visitedCells.has(i)) cell.classList.add('visited');
                if (i === targetIndex) {
                    cell.classList.add('target');
                    cell.textContent = targetNumber;
                }
            }

            const pIdx = currentPosition.getIndex();
            const playerCell = document.getElementById(`cell-${pIdx}`);
            playerCell.classList.add('player');
            playerCell.textContent = cube.faceBehind;
        }

        document.addEventListener('keydown', (e) => {
            // 1. Save current state before moving
            const oldPos = currentPosition.copy();
            const cubeSnapshot = cube.getSnapshot();

            // 2. Perform move
            switch (e.key) {
                case 'ArrowLeft':  currentPosition.x > 0 ? (currentPosition.x--, cube.rotateLeft()) : null; break;
                case 'ArrowRight': currentPosition.x < 9 ? (currentPosition.x++, cube.rotateRight()) : null; break;
                case 'ArrowUp':    currentPosition.y > 0 ? (currentPosition.y--, cube.rotateUp()) : null; break;
                case 'ArrowDown':  currentPosition.y < 9 ? (currentPosition.y++, cube.rotateDown()) : null; break;
                default: return;
            }

            const newIdx = currentPosition.getIndex();

            // 3. Validation Logic
            if (newIdx === oldPos.getIndex()) return; // No movement occurred (hit edge)

            if (visitedCells.has(newIdx)) {
                // Revert!
                currentPosition = oldPos;
                cube.restore(cubeSnapshot);
                updateDisplay("Error: You cannot revisit a cell!");
            } else {
                // Valid move
                visitedCells.add(newIdx);
                
                // Check Win/Loss if hitting target
                if (newIdx === targetIndex) {
                    const diff = (cube.faceBehind % 3 - targetNumber % 3 + 3) % 3;
                    if (diff === 1) score++;
                    else if (diff === 2) score--;
                    targetIndex = null; // Clear target
                }
                updateDisplay();
            }
        });

        updateDisplay();
    </script>
</body>
</html>
