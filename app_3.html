<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10x10 Interactive Grid</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f8f9fa; font-family: sans-serif; }
        #grid { display: grid; grid-template-columns: repeat(10, 40px); gap: 4px; padding: 10px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .cell { width: 40px; height: 40px; background: #eee; display: flex; justify-content: center; align-items: center; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.2s; border: 1px solid #ddd; }
        .cell:hover { filter: brightness(0.9); }
        .active { background: #007bff; color: white; border-color: #0056b3; }
        .linked { background: #ffc107; color: #333; }
    </style>
</head>
<body>

    <h3>Click Box 0 to control Box 10</h3>
    <div id="grid"></div>

    <script>
        document.body.style.cursor = 'default';
        const boxContents = Array.from({ length: 100 }, (_, i) => i);
        const boxActives = Array(100).fill(false);
        const grid = document.getElementById('grid');
        
        // 1. Build the grid
        for (let i = 0; i < 100; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.id = `cell-${i}`; // Assign unique ID
            cell.textContent = boxContents[i];   // Showing ID number for easy reference
            
            cell.addEventListener('click', () => handleBoxClick(i));
            grid.appendChild(cell);
        }

        // 2. Logic Function
        function handleBoxClick(index) {
            boxActives[index] = !boxActives[index];
            checkDependencies(index);

            for(let i = 0; i < 100; i++) {
                const cell = document.getElementById(`cell-${i}`);
                if (boxActives[i]) {
                    cell.classList.add('active');
                } else {
                    cell.classList.remove('active');
                }
            }s
        }

        function checkDependencies(clickedIndex) {
            for(let i = 0; i < 100; i++) {
                if(i % clickedIndex == 0 && clickedIndex != 1) {
                    boxActives[i] = !boxActives[i];
                }
            }
        }
    </script>
</body>
</html>
